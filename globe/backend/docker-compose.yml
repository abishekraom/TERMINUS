version: '3.9'

services:
  vdie:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vdie
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    volumes:
      # Mount Firebase service account at runtime (never bake into image)
      - ./secrets:/app/secrets:ro
      # Persistent local write queue
      - vdie_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  vdie_data:
    driver: local
